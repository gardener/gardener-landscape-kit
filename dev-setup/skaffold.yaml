apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: gardener-landscape-kit
build:
  insecureRegistries:
    - glk-registry.local.gardener.cloud:6001
  artifacts:
    - image: local-skaffold/gardener-landscape-kit
      ko:
        dependencies:
          paths:
            - .github
            - cmd/gardener-landscape-kit
            - cmd/gardener-landscape-kit/app
            - componentvector
            - pkg/apis/config/v1alpha1
            - pkg/apis/config/v1alpha1/validation
            - pkg/cmd
            - pkg/cmd/generate
            - pkg/cmd/generate/base
            - pkg/cmd/generate/landscape
            - pkg/cmd/generate/options
            - pkg/cmd/resolve
            - pkg/cmd/resolve/ocm
            - pkg/cmd/resolve/plain
            - pkg/cmd/version
            - pkg/components
            - pkg/components/flux
            - pkg/components/gardener-extensions/networking-calico
            - pkg/components/gardener-extensions/networking-cilium
            - pkg/components/gardener-extensions/os-gardenlinux
            - pkg/components/gardener-extensions/os-suse-chost
            - pkg/components/gardener-extensions/provider-alicloud
            - pkg/components/gardener-extensions/provider-aws
            - pkg/components/gardener-extensions/provider-azure
            - pkg/components/gardener-extensions/provider-gcp
            - pkg/components/gardener-extensions/provider-openstack
            - pkg/components/gardener-extensions/runtime-gvisor
            - pkg/components/gardener-extensions/shoot-cert-service
            - pkg/components/gardener-extensions/shoot-dns-service
            - pkg/components/gardener-extensions/shoot-networking-problemdetector
            - pkg/components/gardener-extensions/shoot-oidc-service
            - pkg/components/gardener-extensions/shoot-traefik
            - pkg/components/gardener/garden
            - pkg/components/gardener/operator
            - pkg/components/gardener/virtual-garden-access
            - pkg/components/github
            - pkg/components/virtual-garden/garden-config
            - pkg/ocm
            - pkg/ocm/components
            - pkg/ocm/components/helpers
            - pkg/ocm/imagevector
            - pkg/ocm/ociaccess
            - pkg/registry
            - pkg/utils/componentvector
            - pkg/utils/files
            - pkg/utils/kustomization
            - pkg/utils/meta
            - pkg/utils/version
            - VERSION
        ldflags:
          - '{{.LD_FLAGS}}'
        main: ./cmd/gardener-landscape-kit
      hooks:
        after:
          - command:
              - "bash"
              - "-c"
              - "echo $SKAFFOLD_IMAGE > dev-setup/glk-dev-image"
  tagPolicy:
    customTemplate:
      template: '{{.version}}-{{.sha}}-{{.digest}}'
      components:
        - name: version
          envTemplate:
            template: '{{.VERSION}}'
        - name: sha
          gitCommit:
            variant: AbbrevCommitSha
        - name: digest
          inputDigest: {}

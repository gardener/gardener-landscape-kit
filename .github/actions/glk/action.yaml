name: GLK
description: Run gardener-landscape-kit commands using the container image version from components.yaml

inputs:
  components-file:
    description: Path to the GLK components.yaml (used when version is not set)
    required: false
  commands:
    description: |
      GLK commands to execute, one per line. If not provided, runs default commands.
      Lines starting with # are treated as comments and ignored.
      Example:
        generate base      -c landscape/glk.yaml .
        generate landscape -c landscape/glk.yaml .
    required: false
    default: ''
  image-base:
    description: Base image for GLK, default is the public registry.
    required: false
    default: europe-docker.pkg.dev/gardener-project/public/gardener/gardener-landscape-kit
  image-tag:
    description: GLK version to use. Takes precedence over components-file when set.
    required: false

runs:
  using: composite
  steps:
  - name: Resolve GLK version
    id: glk-version
    shell: bash
    env:
      GLK_VERSION_INPUT: ${{ inputs.image-tag }}
      GLK_COMPONENTS_FILE: ${{ inputs.components-file }}
    run: |
      set -euo pipefail
      if [ -n "${GLK_VERSION_INPUT}" ]; then
        version="${GLK_VERSION_INPUT}"
        echo "Using GLK version from input: ${version}"
      elif [ -n "${GLK_COMPONENTS_FILE}" ]; then
        version=$(grep -A1 'name: github.com/gardener/gardener-landscape-kit' "${GLK_COMPONENTS_FILE}" | grep 'version:' | awk '{print $2}')
        echo "Using GLK version from components-file (${GLK_COMPONENTS_FILE}): ${version}"
      else
        echo "Error: either 'version' or 'components-file' must be provided" >&2
        exit 1
      fi
      if [ -z "${version}" ]; then
        echo "Error: could not determine GLK version" >&2
        exit 1
      fi
      echo "version=${version}" >> "$GITHUB_OUTPUT"

  - name: Extract GLK binary from image
    id: glk-binary
    shell: bash
    env:
      GLK_IMAGE: ${{ inputs.image-base }}:${{ steps.glk-version.outputs.version }}
    run: |
      set -euo pipefail
      glk_bin="${RUNNER_TEMP}/gardener-landscape-kit"
      container_id=$(docker create "${GLK_IMAGE}")
      if docker cp "${container_id}:/gardener-landscape-kit" "${glk_bin}" 2>/dev/null; then
        echo "Extracted binary from /gardener-landscape-kit"
      else
        docker cp "${container_id}:/ko-app/gardener-landscape-kit" "${glk_bin}"
        echo "Extracted binary from /ko-app/gardener-landscape-kit"
      fi
      docker rm "${container_id}"
      chmod +x "${glk_bin}"
      echo "bin=${glk_bin}" >> "$GITHUB_OUTPUT"

  - name: Run GLK commands
    shell: bash
    env:
      GLK_BIN: ${{ steps.glk-binary.outputs.bin }}
      GLK_COMMANDS: ${{ inputs.commands }}
    run: |
      set -euo pipefail
      # GLK wrapper function
      glk() {
        "${GLK_BIN}" "$@"
      }

      # GLK commands
      echo "Running GLK commands"

      command_number=0
      while IFS= read -r line; do
        # Skip empty lines and comments
        if [ -n "$line" ] && [[ ! "$line" =~ ^[[:space:]]*# ]]; then
          command_number=$((command_number + 1))

          # Strip 'glk' prefix if present
          if [[ "$line" =~ ^glk[[:space:]]+ ]]; then
            line="${line#glk }"
          fi

          echo "[$command_number] Executing: glk ${line}"
          eval "glk ${line}"
        fi
      done <<< "${GLK_COMMANDS}"

      if [ $command_number -eq 0 ]; then
        echo "Warning: No valid commands found in input"
      else
        echo "Successfully executed $command_number command(s)"
      fi

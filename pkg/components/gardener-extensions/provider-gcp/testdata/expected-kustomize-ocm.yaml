apiVersion: operator.gardener.cloud/v1alpha1
kind: Extension
metadata:
  annotations:
    security.gardener.cloud/pod-security-enforce: baseline
  name: provider-gcp
spec:
  deployment:
    admission:
      runtimeCluster:
        helm:
          ociRepository:
            ref: test-repo/path/charts/gardener/extensions/admission-gcp-runtime:v1.2.3
      values:
        image:
          repository: test-repo/path/gardener/extensions/admission-gcp
          tag: v1.2.3
      virtualCluster:
        helm:
          ociRepository:
            ref: test-repo/path/charts/gardener/extensions/admission-gcp-application:v1.2.3
    extension:
      helm:
        ociRepository:
          ref: test-repo/path/charts/gardener/extensions/provider-gcp:v1.2.3
      injectGardenKubeconfig: true
      runtimeClusterValues:
        image:
          repository: test-repo/path/gardener/extensions/provider-gcp
          tag: v1.2.3
        imageVectorOverwrite: |
          images:
          - name: component1
            ref: test.repo/path/component1:v1.2.3
      values:
        image:
          repository: test-repo/path/gardener/extensions/provider-gcp
          tag: v1.2.3
        imageVectorOverwrite: |
          images:
          - name: component1
            ref: test.repo/path/component1:v1.2.3
  resources:
  - kind: BackupBucket
    type: gcp
  - kind: BackupEntry
    type: gcp
  - kind: Bastion
    type: gcp
  - kind: ControlPlane
    type: gcp
  - kind: DNSRecord
    type: google-clouddns
  - kind: Infrastructure
    type: gcp
  - kind: Worker
    type: gcp

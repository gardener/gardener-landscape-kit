apiVersion: operator.gardener.cloud/v1alpha1
kind: Extension
metadata:
  annotations:
    security.gardener.cloud/pod-security-enforce: baseline
  name: shoot-networking-problemdetector
spec:
  deployment:
    extension:
      helm:
        ociRepository:
          ref: test-repo/path/charts/gardener/extensions/shoot-networking-problemdetector:v1.2.3
      values:
        image:
          repository: test-repo/path/gardener/extensions/shoot-networking-problemdetector
          tag: v1.2.3
        imageVectorOverwrite: |
          images:
          - name: component1
            ref: test.repo/path/component1:v1.2.3
  resources:
  - autoEnable:
    - shoot
    clusterCompatibility:
    - shoot
    kind: Extension
    primary: true
    type: shoot-networking-problemdetector

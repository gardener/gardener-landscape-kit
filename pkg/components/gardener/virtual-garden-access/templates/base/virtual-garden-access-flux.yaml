apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: shoot-access-virtual-garden-flux
  namespace: garden
  labels:
    resources.gardener.cloud/purpose: token-requestor
    resources.gardener.cloud/class: shoot
  annotations:
    serviceaccount.resources.gardener.cloud/name: gardener.cloud:system:gardener-landscape-kit:flux
    serviceaccount.resources.gardener.cloud/namespace: kube-system
    serviceaccount.resources.gardener.cloud/token-expiration-duration: 3h
    serviceaccount.resources.gardener.cloud/inject-ca-bundle: "true"
